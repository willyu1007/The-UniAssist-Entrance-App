version = 1
name = "The-UA-Entrance-APP"

[setup]
script = "pnpm install --frozen-lockfile"

[[actions]]
name = "Run"
icon = "run"
command = '''
(pnpm dev:workflow-platform-api & pnpm dev:workflow-runtime & pnpm dev:connector-runtime & pnpm dev:trigger-scheduler & pnpm dev:worker & pnpm dev & wait)
'''

[[actions]]
name = "Stop"
icon = "debug"
command = '''
pkill -f "pnpm dev:workflow-platform-api" || true
pkill -f "pnpm dev:workflow-runtime" || true
pkill -f "pnpm dev:connector-runtime" || true
pkill -f "pnpm dev:trigger-scheduler" || true
pkill -f "pnpm dev:worker" || true
pkill -f "pnpm --filter @uniassist/control-console dev" || true
(lsof -ti tcp:8788 | xargs kill -TERM) 2>/dev/null || true
(lsof -ti tcp:8792 | xargs kill -TERM) 2>/dev/null || true
(lsof -ti tcp:8895 | xargs kill -TERM) 2>/dev/null || true
(lsof -ti tcp:8896 | xargs kill -TERM) 2>/dev/null || true
(lsof -ti tcp:5173 | xargs kill -TERM) 2>/dev/null || true
echo "Stopped UniAssist pure-v1 run action processes (if running)."
'''
