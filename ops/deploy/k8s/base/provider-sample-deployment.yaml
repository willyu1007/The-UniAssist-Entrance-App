apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-sample
  namespace: uniassist-staging
  labels:
    app: provider-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provider-sample
  template:
    metadata:
      labels:
        app: provider-sample
    spec:
      containers:
        - name: provider-sample
          image: uniassist/provider-sample:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8890
              name: http
          envFrom:
            - configMapRef:
                name: uniassist-common-config
            - secretRef:
                name: uniassist-secrets
          env:
            - name: UNIASSIST_SERVICE_ID
              value: provider-sample
            - name: PORT
              value: "8890"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
