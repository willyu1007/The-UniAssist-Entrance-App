apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-platform-api
  namespace: uniassist-staging
  labels:
    app: workflow-platform-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-platform-api
  template:
    metadata:
      labels:
        app: workflow-platform-api
    spec:
      containers:
        - name: workflow-platform-api
          image: uniassist/workflow-platform-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8791
              name: http
          envFrom:
            - configMapRef:
                name: uniassist-common-config
            - secretRef:
                name: uniassist-secrets
          env:
            - name: PORT
              value: "8791"
            - name: UNIASSIST_SERVICE_ID
              value: workflow-platform-api
