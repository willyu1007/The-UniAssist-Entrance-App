apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: uniassist-staging
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: uniassist/gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
              name: http
          envFrom:
            - configMapRef:
                name: uniassist-common-config
            - secretRef:
                name: uniassist-secrets
          env:
            - name: UNIASSIST_SERVICE_ID
              value: gateway
            - name: PORT
              value: "8787"
            - name: UNIASSIST_SAMPLE_PROVIDER_BASE_URL
              value: http://provider-sample:8890
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
