apiVersion: apps/v1
kind: Deployment
metadata:
  name: adapter-wechat
  namespace: uniassist-staging
  labels:
    app: adapter-wechat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adapter-wechat
  template:
    metadata:
      labels:
        app: adapter-wechat
    spec:
      containers:
        - name: adapter-wechat
          image: uniassist/adapter-wechat:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8788
              name: http
          envFrom:
            - configMapRef:
                name: uniassist-common-config
            - secretRef:
                name: uniassist-secrets
          env:
            - name: UNIASSIST_SERVICE_ID
              value: adapter-wechat
            - name: PORT
              value: "8788"
            - name: GATEWAY_URL
              value: http://gateway:8787
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
