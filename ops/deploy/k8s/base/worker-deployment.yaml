apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: uniassist-staging
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: uniassist/worker:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: uniassist-common-config
            - secretRef:
                name: uniassist-secrets
          env:
            - name: UNIASSIST_SERVICE_ID
              value: worker
