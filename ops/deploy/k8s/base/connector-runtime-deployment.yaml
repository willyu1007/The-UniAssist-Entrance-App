apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector-runtime
  namespace: uniassist-staging
  labels:
    app: connector-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connector-runtime
  template:
    metadata:
      labels:
        app: connector-runtime
    spec:
      containers:
        - name: connector-runtime
          image: uniassist/connector-runtime:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8895
              name: http
          envFrom:
            - configMapRef:
                name: uniassist-common-config
            - secretRef:
                name: uniassist-secrets
          env:
            - name: PORT
              value: "8895"
            - name: UNIASSIST_SERVICE_ID
              value: connector-runtime
