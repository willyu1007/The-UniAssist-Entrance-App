apiVersion: apps/v1
kind: Deployment
metadata:
  name: trigger-scheduler
  namespace: uniassist-staging
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: trigger-scheduler
          resources:
            requests:
              cpu: "100m"
              memory: "160Mi"
            limits:
              cpu: "250m"
              memory: "320Mi"
