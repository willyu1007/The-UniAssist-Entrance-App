apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: uniassist-staging
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: gateway
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
