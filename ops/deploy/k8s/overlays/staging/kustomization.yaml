apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: uniassist/control-console
    newName: ghcr.io/willyu1007/the-ua-entrance-app/control-console
    newTag: staging-latest
  - name: uniassist/workflow-platform-api
    newName: ghcr.io/willyu1007/the-ua-entrance-app/workflow-platform-api
    newTag: staging-latest
  - name: uniassist/workflow-runtime
    newName: ghcr.io/willyu1007/the-ua-entrance-app/workflow-runtime
    newTag: staging-latest
  - name: uniassist/connector-runtime
    newName: ghcr.io/willyu1007/the-ua-entrance-app/connector-runtime
    newTag: staging-latest
  - name: uniassist/trigger-scheduler
    newName: ghcr.io/willyu1007/the-ua-entrance-app/trigger-scheduler
    newTag: staging-latest
  - name: uniassist/worker
    newName: ghcr.io/willyu1007/the-ua-entrance-app/worker
    newTag: staging-latest

patches:
  - path: remove-incluster-deps.patch.yaml
  - path: configmap-staging.patch.yaml
    target:
      group: ""
      version: v1
      kind: ConfigMap
      name: uniassist-common-config
      namespace: uniassist-staging
  - path: secret-staging.patch.yaml
    target:
      group: ""
      version: v1
      kind: Secret
      name: uniassist-secrets
      namespace: uniassist-staging
  - path: control-console-resources.patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: control-console
      namespace: uniassist-staging
  - path: workflow-platform-api-resources.patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: workflow-platform-api
      namespace: uniassist-staging
  - path: workflow-runtime-resources.patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: workflow-runtime
      namespace: uniassist-staging
  - path: connector-runtime-resources.patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: connector-runtime
      namespace: uniassist-staging
  - path: trigger-scheduler-resources.patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: trigger-scheduler
      namespace: uniassist-staging
  - path: worker-resources.patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: worker
      namespace: uniassist-staging
