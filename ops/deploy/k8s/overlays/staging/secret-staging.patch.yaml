apiVersion: v1
kind: Secret
metadata:
  name: uniassist-secrets
  namespace: uniassist-staging
type: Opaque
stringData:
  UNIASSIST_ADAPTER_SECRET: "<replace-with-staging-adapter-secret>"
  UNIASSIST_INTERNAL_AUTH_KEYS_JSON: '{"kid-main":"<replace-with-staging-internal-secret>"}'
  DATABASE_URL: "postgresql://<user>:<password>@<staging-postgres-host>:5432/uniassist_staging"
  REDIS_URL: "redis://<staging-redis-host>:6379"
