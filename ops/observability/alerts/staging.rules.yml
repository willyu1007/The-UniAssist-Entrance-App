groups:
  - name: uniassist-staging-pure-v1
    rules:
      - alert: UniAssistWorkflowPlatformApiUnavailable
        expr: kube_deployment_status_replicas_unavailable{namespace="uniassist-staging",deployment="workflow-platform-api"} > 0
        for: 5m
        labels:
          severity: p1
          service: workflow-platform-api
        annotations:
          summary: "Workflow platform API deployment unavailable"
          description: "workflow-platform-api has unavailable replicas for 5 minutes."
          runbook: "ops/observability/runbooks/incident-playbook.md#p1-workflow-platform-api-unavailable"

      - alert: UniAssistWorkflowRuntimeUnavailable
        expr: kube_deployment_status_replicas_unavailable{namespace="uniassist-staging",deployment="workflow-runtime"} > 0
        for: 5m
        labels:
          severity: p1
          service: workflow-runtime
        annotations:
          summary: "Workflow runtime deployment unavailable"
          description: "workflow-runtime has unavailable replicas for 5 minutes."
          runbook: "ops/observability/runbooks/incident-playbook.md#p1-workflow-runtime-unavailable"

      - alert: UniAssistOutboxBacklogHigh
        expr: uniassist_outbox_backlog_total > 100
        for: 10m
        labels:
          severity: p1
          service: worker
        annotations:
          summary: "Outbox backlog keeps growing"
          description: "outbox backlog has been above 100 for 10 minutes."
          runbook: "ops/observability/runbooks/incident-playbook.md#p1-outbox-backlog-high"

      - alert: UniAssistOutboxDeadLetterDetected
        expr: uniassist_outbox_dead_letter_total > 0
        for: 2m
        labels:
          severity: p1
          service: worker
        annotations:
          summary: "Dead-letter events detected"
          description: "at least one outbox event moved to dead_letter state."
          runbook: "ops/observability/runbooks/incident-playbook.md#p1-dead-letter-detected"

      - alert: UniAssistWorkerUnavailable
        expr: kube_deployment_status_replicas_unavailable{namespace="uniassist-staging",deployment="worker"} > 0
        for: 5m
        labels:
          severity: p1
          service: worker
        annotations:
          summary: "Worker deployment unavailable"
          description: "worker has unavailable replicas for 5 minutes."
          runbook: "ops/observability/runbooks/incident-playbook.md#p1-worker-unavailable"

      - alert: UniAssistConnectorRuntimeUnavailable
        expr: kube_deployment_status_replicas_unavailable{namespace="uniassist-staging",deployment="connector-runtime"} > 0
        for: 5m
        labels:
          severity: p2
          service: connector-runtime
        annotations:
          summary: "Connector runtime deployment unavailable"
          description: "connector-runtime has unavailable replicas for 5 minutes."
          runbook: "ops/observability/runbooks/incident-playbook.md#p2-connector-runtime-unavailable"

      - alert: UniAssistTriggerSchedulerUnavailable
        expr: kube_deployment_status_replicas_unavailable{namespace="uniassist-staging",deployment="trigger-scheduler"} > 0
        for: 5m
        labels:
          severity: p2
          service: trigger-scheduler
        annotations:
          summary: "Trigger scheduler deployment unavailable"
          description: "trigger-scheduler has unavailable replicas for 5 minutes."
          runbook: "ops/observability/runbooks/incident-playbook.md#p2-trigger-scheduler-unavailable"

      - alert: UniAssistControlConsoleUnavailable
        expr: kube_deployment_status_replicas_unavailable{namespace="uniassist-staging",deployment="control-console"} > 0
        for: 10m
        labels:
          severity: p2
          service: control-console
        annotations:
          summary: "Control console deployment unavailable"
          description: "control-console has unavailable replicas for 10 minutes."
          runbook: "ops/observability/runbooks/incident-playbook.md#p2-control-console-unavailable"
