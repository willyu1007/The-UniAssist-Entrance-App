version: 1
variables:
  APP_ENV:
    type: enum
    enum: [dev, staging, prod]
    required: true
    default: dev
    description: Deployment environment profile.
  SERVICE_NAME:
    type: string
    required: true
    default: your-service
    description: Service name (logical).
  PORT:
    type: int
    required: true
    default: 8000
    description: Service listen port.
  UNIASSIST_ENABLE_CONVEX_RUNBOARD_EXPERIMENT:
    type: bool
    required: false
    default: false
    description: Enable the B9 Convex-backed runboard summary experiment inside workflow-platform-api.
  UNIASSIST_CONVEX_URL:
    type: string
    required: false
    description: Convex deployment URL consumed by the B9 runboard projection experiment.
  UNIASSIST_CONNECTOR_REGISTRY_JSON:
    type: string
    required: false
    description: JSON deployment manifest for connector-runtime and workflow-platform-api, listing connectorKey/packageName/exportName/enabled entries that this deployment may load.
